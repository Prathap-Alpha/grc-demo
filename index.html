<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gaborone Rifle Club — ERP Demo</title>
<style>
  :root{--navy:#0D1B2A;--deep:#0B1420;--clay:#F4A623;--cream:#F5F1E6;--steel:#9FB0C0;
    --serif:Georgia,'Playfair Display',serif;--sans:system-ui,'Segoe UI',Roboto,sans-serif;--mono:ui-monospace,Consolas,monospace;}
  *{box-sizing:border-box}html,body{margin:0}
  body{font-family:var(--sans);color:var(--cream);min-height:100vh;
    background:radial-gradient(1200px 800px at 20% -10%,#13314f 0,rgba(19,49,79,0) 60%),linear-gradient(160deg,#0B1420 0,#0D1B2A 100%);background-attachment:fixed}
  .glass{background:rgba(255,255,255,.05);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.10);border-radius:20px}
  .serif{font-family:var(--serif)}.mono{font-family:var(--mono)}.steel{color:var(--steel)}.clay{color:var(--clay)}
  .btn{background:var(--clay);color:var(--deep);border:0;border-radius:10px;padding:10px 16px;font-family:var(--mono);font-weight:700;letter-spacing:.05em;cursor:pointer;box-shadow:0 0 14px rgba(244,166,35,.4)}
  .inp{background:rgba(11,20,32,.6);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px;color:var(--cream);font-size:14px;font-family:var(--sans)}
  .lbl{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.08em;color:var(--steel);margin-bottom:5px}
  .badge{display:inline-block;border-radius:999px;padding:3px 9px;font-family:var(--mono);font-size:11px}
  .b-ok{background:rgba(16,185,129,.15);color:#6ee7b7}.b-warn{background:rgba(245,158,11,.15);color:#fcd34d}.b-grey{background:rgba(255,255,255,.08);color:var(--steel)}
  .b-shot{background:rgba(244,166,35,.15);color:#fcd34d}.b-rifle{background:rgba(56,189,248,.15);color:#7dd3fc}.b-air{background:rgba(16,185,129,.15);color:#6ee7b7}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{font-family:var(--mono);font-size:11px;color:var(--steel);text-align:left;padding:8px 6px;border-bottom:1px solid rgba(255,255,255,.12)}
  td{padding:9px 6px;border-bottom:1px solid rgba(255,255,255,.06)}
  td.r,th.r{text-align:right}
  .crest{filter:drop-shadow(0 0 16px rgba(201,162,39,.5))}
  .alink{color:var(--clay);cursor:pointer;font-family:var(--mono);font-size:12px}
  #login{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(900px 600px at 50% 0%,#16365a 0,rgba(11,20,32,1) 70%)}
  #login .card{width:100%;max-width:360px;padding:28px;margin-top:18px}
  #app{display:none;grid-template-columns:210px 1fr;min-height:100vh}
  .side{border-right:1px solid rgba(255,255,255,.1);background:rgba(11,20,32,.45);padding:18px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:center;gap:8px;margin-bottom:18px}.brand b{font-family:var(--serif);font-size:13px}
  .nav button{display:block;width:100%;text-align:left;background:none;border:0;border-radius:9px;padding:9px 11px;margin-bottom:2px;font-family:var(--mono);font-size:11px;letter-spacing:.07em;color:var(--steel);cursor:pointer}
  .nav button.active{background:rgba(244,166,35,.15);color:var(--clay)}
  .nav button:hover{color:var(--cream)}
  .logout{margin-top:14px;width:100%;border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:8px;background:none;color:var(--steel);font-family:var(--mono);font-size:11px;cursor:pointer}
  .main{padding:26px;max-width:1000px}
  h1.pg{font-family:var(--serif);font-size:28px;font-weight:700;margin:0}.sub{color:var(--steel);margin:4px 0 0}
  .kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:18px}
  .kpi{padding:16px}.kpi .k{font-family:var(--mono);font-size:11px;color:var(--steel)}.kpi .v{font-family:var(--mono);font-size:22px;font-weight:600;margin-top:8px}.kpi .s{font-size:11px;color:var(--steel);margin-top:3px}
  .card{padding:18px;margin-top:14px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  @media(min-width:760px){.kpis{grid-template-columns:repeat(4,1fr)}}
  @media(max-width:600px){#app{grid-template-columns:1fr}.side{display:none}}
  .demobar{position:fixed;bottom:0;left:0;right:0;background:rgba(244,166,35,.12);border-top:1px solid rgba(244,166,35,.3);font-family:var(--mono);font-size:11px;color:#fcd34d;text-align:center;padding:6px;z-index:40}
</style>
</head>
<body>
<svg width="0" height="0"><defs><linearGradient id="brass" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F4D27A"/><stop offset=".5" stop-color="#C9A227"/><stop offset="1" stop-color="#8A6D12"/></linearGradient></defs></svg>

<div id="login">
  <svg class="crest" width="104" height="104" viewBox="0 0 120 120"><g stroke="url(#brass)" stroke-width="5" stroke-linecap="round"><line x1="30" y1="96" x2="90" y2="26"/><line x1="90" y1="96" x2="30" y2="26"/></g><rect x="52" y="42" width="16" height="46" rx="3" fill="url(#brass)"/><path d="M52 42 L60 18 L68 42 Z" fill="url(#brass)"/></svg>
  <div class="mono steel" style="font-size:12px;letter-spacing:.34em;margin-top:12px">GABORONE RIFLE CLUB</div>
  <div class="glass card">
    <h1 class="serif" style="font-size:24px;text-align:center;margin:0">Member Access</h1>
    <p class="steel" style="text-align:center;font-size:13px;margin:6px 0 18px">Enter your credentials to access the portal</p>
    <label class="lbl">USERNAME</label><input class="inp" style="width:100%" value="GRC Admin" />
    <label class="lbl" style="margin-top:14px">PASSWORD</label><input class="inp" style="width:100%" type="password" value="00000000" />
    <button class="btn" style="width:100%;margin-top:20px" onclick="enter()">INITIALIZE SESSION</button>
    <p class="steel mono" style="font-size:10px;text-align:center;margin-top:14px">Demo — click to enter. Sample data only.</p>
  </div>
</div>

<div id="app">
  <aside class="side">
    <div class="brand"><svg width="24" height="24" viewBox="0 0 120 120"><g stroke="url(#brass)" stroke-width="6" stroke-linecap="round"><line x1="30" y1="96" x2="90" y2="26"/><line x1="90" y1="96" x2="30" y2="26"/></g><rect x="52" y="42" width="16" height="46" rx="3" fill="url(#brass)"/><path d="M52 42 L60 18 L68 42 Z" fill="url(#brass)"/></svg><b>Gaborone Rifle Club</b></div>
    <div class="nav" id="nav"></div>
    <button class="logout" onclick="document.getElementById('login').style.display='flex';document.getElementById('app').style.display='none'">LOG OUT</button>
  </aside>
  <main class="main" id="main"></main>
</div>

<div class="demobar">Interactive demo · sample data · try “Raise RQ” and “Amend”. The real app runs at localhost:3007 with live data.</div>

<script>
const money=n=>(n<0?'('+Math.abs(n).toLocaleString(undefined,{minimumFractionDigits:2})+')':n.toLocaleString(undefined,{minimumFractionDigits:2}));
function enter(){document.getElementById('login').style.display='none';document.getElementById('app').style.display='grid';show('dash');}
const TABS=[['dash','Dashboard'],['rq','Requisitions'],['suppliers','Suppliers'],['members','Members'],['events','Events'],['inventory','Inventory'],['reports','Reports']];

let nextRq=341;
const rqs=[
 {ref:'RQ-340',payee:'Transport refund',amt:1650,st:'PENDING'},
 {ref:'RQ-339',payee:'Gift wages — May 2026',amt:2100,st:'PAID'},
 {ref:'RQ-338',payee:'Gift wages — April 2026',amt:2100,st:'PAID'},
 {ref:'RQ-337',payee:'Range officer reimbursement',amt:3480,st:'PAID'},
 {ref:'RQ-336',payee:'Ammunition supplier',amt:134800,st:'PENDING'},
];
const suppliers=[
 ['Pan-African Ammunition','First Capital Bank','LOCKED'],['Clay Targets Supplies','Stanbic','LOCKED'],
 ['Trap Machine Services','—','PENDING'],['Premier Auto Repairs','—','NO DETAILS'],['Range Hardware Co','First National Bank','LOCKED'],
 ['Print & Signage Co','—','PENDING'],['Fuel & Logistics','—','NO DETAILS'],['Trophy & Engraving','—','PENDING'],
 ['Catering Services','—','NO DETAILS'],['Water Bowser Services','First Capital Bank','LOCKED'],['Promatic Clay Machines','Absa','LOCKED'],
 ['Laser & Electronics','—','PENDING'],['Grounds Maintenance','—','NO DETAILS'],['Security Services','—','NO DETAILS'],
 ['Insurance Brokers','—','PENDING'],['Stationery Supplies','—','NO DETAILS'],['Photography Services','—','NO DETAILS'],
 ['Transport Holdings','First Capital Bank','LOCKED'],['First Aid / Medical','—','NO DETAILS'],['IT & Web Services','—','PENDING'],
 ['Targets & Markers Co','—','NO DETAILS'],['Refreshments Supplier','—','NO DETAILS'],['Plumbing & Repairs','—','NO DETAILS'],
 ['Electrical Works','—','PENDING'],['Cleaning Services','—','NO DETAILS'],['Range Helper (wages)','First National Bank','LOCKED'],
 ['Competition Prizes','—','NO DETAILS'],['Member Reimbursements','—','NO DETAILS'],
];
const members=[['James M.','Individual','ACTIVE'],['Peter N.','Individual','ACTIVE'],['Acme Corporate (Pty)','Corporate','ACTIVE'],['Samuel K.','Individual','LAPSED'],['David R.','Individual','ACTIVE'],['Grace T.','Individual','ACTIVE'],['Highveld Holdings','Corporate','ACTIVE'],['Brian O.','Individual','LAPSED'],['Lerato M.','Individual','ACTIVE'],['Thabo S.','Individual','ACTIVE']];
const events=[['Open Championship 2026','SHOTGUN','Competition','2026-07-15'],['Sunday Rifle Practice','RIFLE','Practice','2026-07-05'],['Airgun Shootout','AIRGUN','Competition','2026-08-01']];
const inv=[['Clever Mirage T2 28gr','AMMO',300],['Clever Mirage T4 28gr','AMMO',260],['Clever Mirage T2 24gr','AMMO',80],['Eley 28gr','AMMO',30],['Sporting Clays','CLAY',4200]];
const pl={income:[['Ammo Sales',686777.50],['Membership Fees',71425],['Corporate Membership',30500],['Ammo Recoveries',8500]],exp:[['Ammo & Clay Purchases',513860.63],['Clay Purchases',71504.05],['Competition Expenses',60368.94],['Autoball Machine (capital)',108536.23],['Other expenses',67693.44]]};

const disc=d=>({SHOTGUN:'b-shot',RIFLE:'b-rifle',AIRGUN:'b-air'}[d]||'b-grey');
const stBadge=s=>['LOCKED','ACTIVE','PAID'].includes(s)?'b-ok':['NO DETAILS'].includes(s)?'b-grey':'b-warn';

function show(id){
 document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
 const m=document.getElementById('main');
 if(id==='dash')m.innerHTML=dash();
 else if(id==='rq')m.innerHTML=rqView();
 else if(id==='suppliers')m.innerHTML=listView('Suppliers','Payees and verified banking details — '+suppliers.length+' on file.',['NAME','BANK','STATUS'],suppliers.map(s=>[s[0],s[1],`<span class="badge ${stBadge(s[2])}">${s[2]}</span>`]));
 else if(id==='members')m.innerHTML=listView('Members','The club roll — P1,500/yr individual + corporate.',['NAME','TYPE','STANDING'],members.map(s=>[s[0],s[1],`<span class="badge ${stBadge(s[2])}">${s[2]}</span>`]));
 else if(id==='events')m.innerHTML=listView('Events','Plan shotgun, rifle & airgun events.',['EVENT','DISCIPLINE','TYPE','DATE'],events.map(e=>[e[0],`<span class="badge ${disc(e[1])}">${e[1]}</span>`,e[2],e[3]]));
 else if(id==='inventory')m.innerHTML=listView('Inventory — Ammo & Clays','Live balances from stock movements.',['PRODUCT','CATEGORY','ON HAND'],inv.map(p=>[p[0],`<span class="badge ${p[1]==='AMMO'?'b-shot':'b-air'}">${p[1]}</span>`,`<span class="mono">${p[2]}</span>`]));
 else if(id==='reports')m.innerHTML=reports();
}

function dash(){return `<h1 class="pg">Morning, Range Officer</h1><p class="sub">The Gaborone Range is currently active.</p>
 <div class="kpis">
  <div class="glass kpi"><div class="k">CASH ON HAND</div><div class="v">BWP 249,945</div><div class="s">FY25 year-end</div></div>
  <div class="glass kpi"><div class="k">AMMO SALES YTD</div><div class="v">686,778</div><div class="s">BWP (FY25)</div></div>
  <div class="glass kpi"><div class="k">SUPPLIERS</div><div class="v">${suppliers.length}</div><div class="s">${suppliers.filter(s=>s[2]==='LOCKED').length} bank-verified</div></div>
  <div class="glass kpi"><div class="k">NEXT RQ</div><div class="v clay">RQ-${nextRq}</div><div class="s">continues 2026 seq.</div></div>
 </div>
 <div class="glass card"><div class="row"><span class="serif" style="font-size:17px">Recent Requisitions</span><button class="btn" onclick="show('rq')">+ RAISE RQ</button></div>
  <table style="margin-top:10px"><tbody>${rqs.slice(0,5).map(r=>`<tr><td class="mono">${r.ref}</td><td class="steel">${r.payee}</td><td class="r mono">BWP ${money(r.amt)}</td><td class="r"><span class="badge ${stBadge(r.st)}">${r.st}</span></td></tr>`).join('')}</tbody></table>
 </div>`;}

function rqView(){return `<h1 class="pg">Requisitions</h1><p class="sub">Next number: RQ-${nextRq}. Pending RQs can be amended.</p>
 <div class="glass card"><div class="mono clay" style="font-size:11px">RAISE A REQUISITION</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px">
   <input class="inp" id="rp" placeholder="Payable to" style="flex:2;min-width:180px"/>
   <input class="inp" id="ra" placeholder="Amount" inputmode="decimal" style="flex:1;min-width:120px"/>
   <button class="btn" onclick="raise()">GENERATE RQ-${nextRq}</button>
  </div></div>
 <div class="glass card"><table><thead><tr><th>RQ</th><th>PAYABLE TO</th><th class="r">AMOUNT (BWP)</th><th class="r">STATUS</th><th class="r">ACTION</th></tr></thead>
  <tbody>${rqs.map(r=>`<tr><td class="mono clay">${r.ref}</td><td>${r.payee}</td><td class="r mono">${money(r.amt)}</td><td class="r"><span class="badge ${stBadge(r.st)}">${r.st}</span></td><td class="r">${r.st==='PENDING'?`<span class="alink" onclick="amend('${r.ref}')">Amend</span>`:'<span class="steel" style="font-size:12px">locked</span>'}</td></tr>`).join('')}</tbody></table></div>`;}

function raise(){const p=document.getElementById('rp').value.trim();const a=parseFloat(document.getElementById('ra').value)||0;
 if(!p||a<=0){alert('Enter a payee and amount.');return;}
 rqs.unshift({ref:'RQ-'+nextRq,payee:p,amt:a,st:'PENDING'});nextRq++;show('rq');}

function amend(ref){const r=rqs.find(x=>x.ref===ref);if(!r)return;
 const np=prompt('Amend payee for '+ref+':',r.payee);if(np===null)return;
 const na=prompt('Amend amount for '+ref+' (BWP):',r.amt);if(na===null)return;
 r.payee=np.trim()||r.payee;r.amt=parseFloat(na)||r.amt;show('rq');}

function listView(title,sub,cols,rows){return `<h1 class="pg">${title}</h1><p class="sub">${sub}</p>
 <div class="glass card"><table><thead><tr>${cols.map((c,i)=>`<th class="${i===cols.length-1?'r':''}">${c}</th>`).join('')}</tr></thead>
 <tbody>${rows.map(r=>`<tr>${r.map((c,i)=>`<td class="${i===r.length-1?'r':''}">${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`;}

function reports(){const ti=pl.income.reduce((s,x)=>s+x[1],0),te=pl.exp.reduce((s,x)=>s+x[1],0);
 return `<h1 class="pg">Financial Statements</h1><p class="sub">Derived live from the journals — FY25.</p>
 <div class="glass card"><div class="serif" style="font-size:17px">Statement of Income &amp; Expenditure</div>
  <table style="margin-top:8px"><tbody>
   <tr><td class="mono steel" style="font-size:11px">INCOME</td><td></td></tr>
   ${pl.income.map(x=>`<tr><td>${x[0]}</td><td class="r mono">${money(x[1])}</td></tr>`).join('')}
   <tr style="border-top:1px solid rgba(255,255,255,.15)"><td><b>Total income</b></td><td class="r mono">${money(ti)}</td></tr>
   <tr><td class="mono steel" style="font-size:11px;padding-top:10px">EXPENDITURE</td><td></td></tr>
   ${pl.exp.map(x=>`<tr><td>${x[0]}</td><td class="r mono">${money(x[1])}</td></tr>`).join('')}
   <tr style="border-top:1px solid rgba(255,255,255,.15)"><td><b>Total expenditure</b></td><td class="r mono">${money(te)}</td></tr>
   <tr><td class="serif">Surplus / (Deficit)</td><td class="r mono" style="color:${ti-te<0?'#fca5a5':'#6ee7b7'}">${money(ti-te)}</td></tr>
  </tbody></table></div>
 <div class="glass card"><div class="serif" style="font-size:17px">Statement of Financial Position · 31 Dec 2025</div>
  <table style="margin-top:8px"><tbody>
   <tr><td>Cash &amp; cash equivalents</td><td class="r mono">249,944.78</td></tr>
   <tr><td>Inventory &amp; PPE</td><td class="r mono">disclosed (Notes)</td></tr>
   <tr style="border-top:1px solid rgba(255,255,255,.15)"><td><b>Total assets</b></td><td class="r mono">249,944.78</td></tr>
   <tr><td>Accumulated surplus</td><td class="r mono">249,944.78</td></tr>
   <tr><td class="mono" style="font-size:11px;color:#6ee7b7">✓ balanced · debt-free</td><td></td></tr>
  </tbody></table></div>
 <div class="glass card"><div class="serif" style="font-size:17px">Cash Flow</div>
  <table style="margin-top:8px"><tbody>
   <tr><td>Operating activities</td><td class="r mono">+83,375.44</td></tr>
   <tr><td>Investing (clay machine)</td><td class="r mono">(108,536.23)</td></tr>
   <tr><td class="serif">Closing cash</td><td class="r mono clay">249,944.78</td></tr>
  </tbody></table></div>`;}

document.getElementById('nav').innerHTML=TABS.map(t=>`<button data-id="${t[0]}" onclick="show('${t[0]}')">${t[1].toUpperCase()}</button>`).join('');
</script>
</body>
</html>
